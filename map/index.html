<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peta Persebaran</title>

<link rel="stylesheet" href="../css/map.css">

</head>

<body>

<div class="container">

    <header>

        <h1>Peta Persebaran</h1>

        <p>
            Pilih lokasi penemuan untuk memulai pembelajaran.
        </p>

    </header>

    <div class="map-container">

        <img
            id="indonesiaMap"
            src="../assets/images/maps/indonesia.svg"
            alt="Peta Indonesia">

        <img
            id="marker"
            src="../assets/icons/marker.svg"
            alt="Marker Sangiran">

    </div>

</div>


<div id="card">

    <img
        src="../assets/images/locations/sangiran.webp"
        alt="Sangiran">

    <h2>Sangiran</h2>

    <p>

        Situs Sangiran merupakan salah satu kawasan
        penemuan manusia purba terpenting di Indonesia.

    </p>

    <button id="startLearning">

        Mulai Belajar

    </button>

</div>


<script src="../js/map.js"></script>

</body>
</html>
