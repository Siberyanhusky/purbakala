<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KURBUTEKS AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* FIX: a-scene harus full screen dan tidak ter-block */
    a-scene {
      width: 100% !important;
      height: 100% !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      z-index: 0;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    #loading h2 {
      font-size: 2rem;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    #loading p {
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 24px;
    }

    #start-btn {
      padding: 12px 28px;
      font-size: 1rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #start-btn:hover {
      background: #ddd;
    }
  </style>
</head>
<body>

  <!-- Loading overlay dengan tombol start -->
  <div id="loading">
    <h2>KURBUTEKS</h2>
    <p>Arahkan kamera ke Image Target Meganthropus.</p>
    <!-- FIX: Tombol untuk trigger izin kamera (user gesture required di banyak browser) -->
    <button id="start-btn">Mulai AR</button>
  </div>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ../assets/markers/meganthropus.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <a-asset-item
        id="meganthropusModel"
        src="../assets/models/meganthropus.glb">
      </a-asset-item>
    </a-assets>

    <!-- Lighting -->
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>

    <!-- FIX: Camera harus pakai 'look-controls' disabled dan 'wasd-controls' disabled -->
    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>

    <!-- Marker target -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="model"
        src="#meganthropusModel"
        position="0 0 0"
        rotation="0 180 0"
        scale="0.5 0.5 0.5">
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const btn = document.getElementById('start-btn');
    const loading = document.getElementById('loading');
    const scene = document.getElementById('ar-scene');

    btn.addEventListener('click', () => {
      // Sembunyikan overlay setelah user klik (user gesture = izin kamera terpicu)
      loading.style.display = 'none';

      // Pastikan scene MindAR aktif
      const sceneEl = scene;
      sceneEl.addEventListener('arReady', () => {
        console.log('MindAR is ready');
      });

      sceneEl.addEventListener('arError', (e) => {
        console.error('MindAR error:', e);
        loading.style.display = 'flex';
        document.querySelector('#loading p').textContent =
          'Gagal mengakses kamera. Pastikan izin kamera diaktifkan.';
        btn.textContent = 'Coba Lagi';
      });
    });
  </script>

</body>
</html>
