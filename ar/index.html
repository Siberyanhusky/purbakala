<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>KURBUTEKS AR</title>

<link rel="stylesheet" href="../css/ar.css">

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script defer src="../js/ar.js"></script>

</head>

<body>

<div id="loading">

    <h2>KURBUTEKS</h2>

    <p>

        Arahkan kamera ke Image Target Meganthropus.

    </p>

</div>

<a-scene

mindar-image="imageTargetSrc: ../assets/markers/meganthropus.mind; uiScanning: yes; uiLoading: yes;"

color-space="sRGB"

renderer="colorManagement: true; physicallyCorrectLights: true;"

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false"

>

<a-assets>

    <asset-item

        id="meganthropusModel"

        src="../assets/models/meganthropus.glb">

    </asset-item>

</a-assets>

<!-- Lighting -->

<a-light

type="ambient"

intensity="1.2">

</a-light>

<a-light

type="directional"

position="1 2 1"

intensity="1.2">

</a-light>

<!-- Camera -->

<a-camera

position="0 0 0"

look-controls="enabled: false">

</a-camera>

<!-- Marker -->

<a-entity mindar-image-target="targetIndex: 0">

    <a-gltf-model

        id="model"

        src="#meganthropusModel"

        position="0 0 0"

        rotation="0 180 0"

        scale="0.5 0.5 0.5">

    </a-gltf-model>

</a-entity>

</a-scene>

</body>

</html>
