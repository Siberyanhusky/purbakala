<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KURBUTEKS AR</title>
  <link rel="stylesheet" href="../css/ar.css">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- ① Loading overlay -->
  <div id="loading">
    <h2>KURBUTEKS</h2>
    <p>Arahkan kamera ke Image Target Meganthropus.</p>
  </div>

  <!-- ② Tombol kembali -->
  <button class="back-button" id="back-btn">← Kembali</button>

  <!-- ③ Scale controls -->
  <div id="scale-controls">
    <button id="scale-up">➕</button>
    <button id="scale-reset">🔄</button>
    <button id="scale-down">➖</button>
  </div>

  <!-- ④ Audio preload -->
  <audio id="audio-intro"   src="../assets/audio/meganthropus/intro.mp3"   preload="auto"></audio>
  <audio id="audio-kepala"  src="../assets/audio/meganthropus/kepala.mp3"  preload="auto"></audio>
  <audio id="audio-rahang"  src="../assets/audio/meganthropus/rahang.mp3"  preload="auto"></audio>
  <audio id="audio-badan"   src="../assets/audio/meganthropus/badan.mp3"   preload="auto"></audio>
  <audio id="audio-lengan"  src="../assets/audio/meganthropus/lengan.mp3"  preload="auto"></audio>
  <audio id="audio-kaki"    src="../assets/audio/meganthropus/kaki.mp3"    preload="auto"></audio>

  <!-- ⑤ A-Frame scene -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ../assets/markers/meganthropus.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <a-asset-item id="meganthropusModel" src="../assets/models/meganthropus.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="model"
        src="#meganthropusModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.5 0.5 0.5">
      </a-gltf-model>
    </a-entity>
  </a-scene>

<!-- ⑥ Info panel (muncul saat marker ditemukan) -->
<div id="info-panel">

    <div id="panel-header">

        <span>🦴 Meganthropus Paleojavanicus</span>

        <button
    id="close-info"
    type="button">

    ✕

</button>

    </div>

    <hr>
    <!-- Focus mode buttons -->
    <div id="focus-buttons">
      <button class="focus-btn" data-part="kepala">① Kepala</button>
      <button class="focus-btn" data-part="rahang">② Rahang</button>
      <button class="focus-btn" data-part="badan">③ Badan</button>
      <button class="focus-btn" data-part="lengan">④ Lengan</button>
      <button class="focus-btn" data-part="kaki">⑤ Kaki</button>
    </div>
    <hr>

    <!-- Caption -->
    <div id="caption">Pilih bagian untuk mulai eksplorasi.</div>
    <hr>

    <!-- Progress -->
    <div id="progress-dots">
      <span class="dot" data-part="kepala">○</span>
      <span class="dot" data-part="rahang">○</span>
      <span class="dot" data-part="badan">○</span>
      <span class="dot" data-part="lengan">○</span>
      <span class="dot" data-part="kaki">○</span>
    </div>
    <hr>

    <!-- Quiz button (terkunci sampai semua bagian selesai) -->
    <button id="quiz-btn" disabled>🔒 Selesaikan semua bagian dulu</button>
  </div>

<button
id="open-info"

hidden>

ⓘ

</button>

<script src="../js/ar.js"></script>

</body>
</html>
