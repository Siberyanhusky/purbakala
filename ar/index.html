<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KURBUTEKS AR</title>
  <link rel="stylesheet" href="../css/ar.css">
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- Loading panel — muncul sebelum AR dimulai -->
  <div id="loading">
    <h2>KURBUTEKS</h2>
    <p>Arahkan kamera ke Image Target Meganthropus.</p>
  </div>

  <!-- Tombol kembali -->
  <button class="back-button" onclick="history.back()">← Kembali</button>

  <!-- Tombol scan / start AR -->
  <button class="floating-button" id="start-btn" title="Mulai AR">
    &#x1F4F7;
  </button>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ../assets/markers/meganthropus.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <a-asset-item
        id="meganthropusModel"
        src="../assets/models/meganthropus.glb">
      </a-asset-item>
    </a-assets>

    <!-- Lighting -->
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>

    <!-- Camera -->
    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>

    <!-- Marker target -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="model"
        src="#meganthropusModel"
        position="0 0 0"
        rotation="0 180 0"
        scale="0.5 0.5 0.5">
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <!-- Info bawah — muncul setelah target terdeteksi (opsional) -->
  <div class="bottom-info" id="bottom-info" style="display:none;">
    <h3>Meganthropus Paleojavanicus</h3>
    <p>Salah satu fosil manusia purba tertua yang ditemukan di Jawa, Indonesia.</p>
  </div>

  <script>
    const startBtn   = document.getElementById('start-btn');
    const loading    = document.getElementById('loading');
    const bottomInfo = document.getElementById('bottom-info');
    const sceneEl    = document.getElementById('ar-scene');

    // Klik tombol kamera → sembunyikan loading, mulai AR
    startBtn.addEventListener('click', () => {
      loading.style.display    = 'none';
      startBtn.style.display   = 'none';

      // Tampilkan info bawah setelah target terdeteksi
      sceneEl.addEventListener('targetFound', () => {
        bottomInfo.style.display = 'block';
      });

      sceneEl.addEventListener('targetLost', () => {
        bottomInfo.style.display = 'none';
      });
    });

    // Tangani error kamera
    sceneEl.addEventListener('arError', () => {
      loading.style.display = 'block';
      loading.querySelector('p').textContent =
        'Gagal mengakses kamera. Pastikan izin kamera diaktifkan, lalu muat ulang halaman.';
      startBtn.style.display = 'flex';
    });
  </script>

</body>
</html>
