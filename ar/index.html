<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AR | KURBUTEKS</title>

<link rel="stylesheet" href="../css/ar.css">

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script defer src="../js/ar.js"></script>

</head>

<body>

<div id="loading">

    <h2>KURBUTEKS AR</h2>

    <p>

        Arahkan kamera ke marker Meganthropus.

    </p>

</div>

<a-scene

mindar-image="
imageTargetSrc: ../assets/markers/meganthropus.mind;
uiScanning: no;
uiLoading: no;
"

embedded

color-space="sRGB"

renderer="

colorManagement:true;

physicallyCorrectLights:true;

"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

>

<a-assets>

<asset-item

id="meganthropus"

src="../assets/models/meganthropus.glb">

</asset-item>

</a-assets>

<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>

<a-entity mindar-image-target="targetIndex:0">

<a-gltf-model

src="#meganthropus"

position="0 -0.4 0"

rotation="0 0 0"

scale="0.35 0.35 0.35">

</a-gltf-model>

</a-entity>

</a-scene>

</body>

</html>
