<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KURBUTEKS AR</title>
  <link rel="stylesheet" href="../css/ar.css">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    /* Paksa video kamera MindAR tetap tampil */
    video {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }
    .a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 1 !important;
      background: transparent !important;
    }
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div id="loading">
    <h2>KURBUTEKS</h2>
    <p>Tekan tombol di bawah untuk memulai AR.</p>
  </div>

  <button class="back-button" onclick="history.back()">← Kembali</button>
  <button class="floating-button" id="start-btn" title="Mulai AR">📷</button>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ../assets/markers/meganthropus.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <a-asset-item id="meganthropusModel" src="../assets/models/meganthropus.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="model"
        src="#meganthropusModel"
        position="0 0 0"
        rotation="0 180 0"
        scale="0.5 0.5 0.5">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <div class="bottom-info" id="bottom-info" style="display:none;">
    <h3>Meganthropus Paleojavanicus</h3>
    <p>Salah satu fosil manusia purba tertua yang ditemukan di Jawa, Indonesia.</p>
  </div>

  <script>
    const startBtn   = document.getElementById('start-btn');
    const loading    = document.getElementById('loading');
    const bottomInfo = document.getElementById('bottom-info');
    const sceneEl    = document.getElementById('ar-scene');

    startBtn.addEventListener('click', async () => {
      loading.style.display  = 'none';
      startBtn.style.display = 'none';

      // Cek dulu kamera tersedia
      try {
        // Coba environment (HP belakang), fallback ke kamera manapun
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } }
          });
        } catch {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
        }
        // Lepas — MindAR akan buat stream sendiri
        stream.getTracks().forEach(t => t.stop());
      } catch (err) {
        loading.style.display = 'block';
        loading.querySelector('p').textContent =
          'Gagal akses kamera: ' + err.message + '. Pastikan izin kamera aktif.';
        startBtn.style.display = 'flex';
        return;
      }

      // Setelah MindAR siap, paksa video element tampil
      sceneEl.addEventListener('arReady', () => {
        const videos = document.querySelectorAll('video');
        videos.forEach(v => {
          v.style.cssText = `
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            object-fit: cover !important;
            z-index: 0 !important;
          `;
        });
      });

      sceneEl.addEventListener('targetFound', () => {
        bottomInfo.style.display = 'block';
      });
      sceneEl.addEventListener('targetLost', () => {
        bottomInfo.style.display = 'none';
      });

      sceneEl.addEventListener('arError', () => {
        loading.style.display = 'block';
        loading.querySelector('p').textContent =
          'AR error. Coba muat ulang halaman dan izinkan akses kamera.';
        startBtn.style.display = 'flex';
      });
    });
  </script>

</body>
</html>
